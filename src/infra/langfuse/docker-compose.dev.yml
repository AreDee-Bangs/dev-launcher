name: langfuse-dev
services:
  langfuse-db:
    image: postgres:16-alpine
    container_name: dev-langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse_dev}
    ports:
      - "${LANGFUSE_DB_PORT:-5433}:5432"
    volumes:
      - langfuse-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    container_name: dev-langfuse
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "${LANGFUSE_PORT:-3201}:3000"
    environment:
      DATABASE_URL: "postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-langfuse_dev}@langfuse-db:5432/langfuse"
      NEXTAUTH_URL: "http://localhost:${LANGFUSE_PORT:-3201}"
      NEXTAUTH_SECRET: "${LANGFUSE_NEXTAUTH_SECRET:-langfuse_dev_nextauth_secret_changeme}"
      SALT: "${LANGFUSE_SALT:-langfuse_dev_salt_changeme}"
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      LANGFUSE_INIT_USER_EMAIL: "${LANGFUSE_ADMIN_EMAIL:-admin@example.com}"
      LANGFUSE_INIT_USER_PASSWORD: "${LANGFUSE_ADMIN_PASSWORD:-changeme}"
      LANGFUSE_INIT_USER_NAME: "${LANGFUSE_ADMIN_NAME:-Admin}"
      LANGFUSE_INIT_PROJECT_NAME: "${LANGFUSE_PROJECT_NAME:-filigran-dev}"
      LANGFUSE_INIT_PROJECT_SECRET_KEY: "${LANGFUSE_SECRET_KEY:-lf_sk_dev_changeme_secretkey}"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY:-lf_pk_dev_changeme_publickey}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/public/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

volumes:
  langfuse-pgdata:
