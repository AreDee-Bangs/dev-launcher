# =============================================================================
# dev-launcher — Repository Registry
# =============================================================================
# Each entry is a [local-dir-name] section followed by key = value lines.
#
#   label  — human-readable display name (required)
#   url    — git clone URL, SSH or HTTPS (required)
#   group  — logical group shown as a header in the clone selector (optional)
#
# To add a repository: paste a new section anywhere in the appropriate group.
# To override this file: copy it to ~/.dev-launcher/repos.conf and edit there.
# =============================================================================

# ── Filigran ──────────────────────────────────────────────────────────────────

[filigran-copilot]
label = Filigran Copilot
url   = https://github.com/FiligranHQ/filigran-copilot.git
group = Filigran

[xtm-hub]
label = XTM Hub
url   = https://github.com/FiligranHQ/xtm-hub.git
group = Filigran

[xtm-browser-extension]
label = XTM Browser Extension
url   = https://github.com/FiligranHQ/xtm-browser-extension.git
group = Filigran

