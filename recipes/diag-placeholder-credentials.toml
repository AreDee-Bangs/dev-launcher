id       = "diag-placeholder-credentials"
health   = "any"
log_tail = 50

[[match]]
any_of = ["changeme"]

title = "Placeholder credentials in use"
body = [
    "  A 'ChangeMe' placeholder value reached the application at runtime.",
    "  Edit your .env.dev (or workspace .env) and replace all placeholder values.",
    "  Press 'e' in the TUI to open the credentials wizard.",
]
