id       = "diag-elasticsearch"
health   = "any"
log_tail = 80

[[match]]
any_of = [
    "elasticsearch: no living connections",
    "connection refused to localhost:9200",
    # OpenCTI's @opensearch-project client emits these on a dead search engine.
    "@opensearch-project/opensearch",
    "[search] engine client not specified",
    "[check] checking if search engine is alive",
    "read econnreset",
]

title = "Elasticsearch / OpenSearch cluster is unreachable"
body = [
    "  The search engine (Elasticsearch or OpenSearch) is not accepting",
    "  connections. OpenCTI's GraphQL backend retries the dependency check on",
    "  startup and exits when it can't reach the engine.",
    "",
    "  Check the Docker container:",
    "    docker ps -a | grep -E 'elastic|opensearch'",
    "    docker start <elasticsearch-or-opensearch-container>",
    "",
    "  Bring up the dev compose for OpenCTI:",
    "    cd opencti/opencti-platform/opencti-dev && docker compose up -d",
    "",
    "  If the container keeps restarting on Linux, raise vm.max_map_count:",
    "    sudo sysctl -w vm.max_map_count=262144",
    "",
    "  If you run several stacks at once, dev-launcher >= v0.1.4 picks port",
    "  offsets dynamically — re-launch the workspace so docker bindings and the",
    "  env file agree on the host port.",
]
